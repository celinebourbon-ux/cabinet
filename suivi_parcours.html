<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parcours V.A.L.E.U.R© — Suivi complet</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --f:#F5F1EB;--f2:#EDE8DF;--f3:#E2DBC8;
  --ink:#1A1714;--ink2:rgba(26,23,20,.65);--ink3:rgba(26,23,20,.35);
  --dark:#1C1916;--dark2:#2A2520;
  --gold:#A8873A;
  --line:rgba(26,23,20,.08);--line2:rgba(26,23,20,.04);
  --rouge:#B5312A;--orange:#C4581F;--jaune:#B8930A;
  --vert:#2D7A4F;--bleu:#1D5F8A;--indigo:#5C3280;--violet:#7A3594;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --sb:256px;--nav:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--f);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
.chroma{display:flex;height:3px}
.chroma div{flex:1}

/* AUTH */
#login{position:fixed;inset:0;z-index:900;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column}
.lcard{background:rgba(245,241,235,.04);border:1px solid rgba(168,135,58,.2);border-radius:2px;padding:40px 44px;width:min(380px,92vw);text-align:center}
.llogo{font-family:var(--serif);font-size:11px;letter-spacing:5px;text-transform:uppercase;color:rgba(168,135,58,.7);margin-bottom:20px}
.ltitle{font-family:var(--serif);font-size:22px;font-weight:300;color:rgba(245,241,235,.85);margin-bottom:20px}
.lpwd{width:100%;padding:11px 14px;background:rgba(245,241,235,.05);border:1px solid rgba(168,135,58,.22);border-radius:2px;font-family:var(--sans);font-size:13px;color:rgba(245,241,235,.8);outline:none;text-align:center;letter-spacing:3px;margin-bottom:14px}
.lpwd:focus{border-color:rgba(168,135,58,.5)}
.lbtn{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:2px;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase}

/* LAYOUT */
#app{display:none;min-height:100vh}
#app.on{display:flex}
.sb{width:var(--sb);min-height:100vh;background:var(--dark);flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(245,241,235,.05)}
.sb-brand{font-family:var(--serif);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(168,135,58,.75)}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;font-size:12px;color:rgba(245,241,235,.42);border-left:2px solid transparent;transition:all .15s;text-decoration:none}
.sb-item:hover{color:rgba(245,241,235,.75);background:rgba(245,241,235,.03)}
.sb-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(168,135,58,.07)}
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--nav);background:var(--f);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.tb-back{font-size:11px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:6px}
.tb-back:hover{color:var(--ink)}
.content{padding:28px 32px 64px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:2px;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;border:none;transition:all .18s}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#C4A550}
.btn-ghost{background:transparent;color:var(--ink3);border:1px solid var(--line)}.btn-ghost:hover{color:var(--ink);border-color:rgba(26,23,20,.2)}
.btn-sm{padding:6px 12px;font-size:9px}

/* PARCOURS TABS */
.parcours-tabs{display:flex;gap:0;background:var(--f2);border:1px solid var(--line);border-radius:2px;overflow:hidden;margin-bottom:24px}
.ptab{flex:1;padding:14px 10px;text-align:center;cursor:pointer;border-right:1px solid var(--line);transition:all .15s;position:relative}
.ptab:last-child{border-right:none}
.ptab.active{background:var(--dark);color:var(--f)}
.ptab:not(.active):hover{background:var(--f3)}
.ptab-num{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:3px}
.ptab.active .ptab-num{color:rgba(245,241,235,.4)}
.ptab-label{font-family:var(--serif);font-size:13px;font-weight:400;color:var(--ink)}
.ptab.active .ptab-label{color:rgba(245,241,235,.85)}
.ptab-check{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--gold);display:none}
.ptab.done .ptab-check{display:block}

/* ÉTAPE CARD */
.etape-card{background:var(--f2);border:1px solid var(--line);border-radius:2px;margin-bottom:16px}
.ec-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.ec-head:hover{background:rgba(237,232,223,.5)}
.ec-title{font-family:var(--serif);font-size:16px;font-weight:300;color:var(--ink)}
.ec-status{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.ec-body{padding:20px 22px;display:none}
.ec-body.open{display:block}

/* CHECKS COCHABLES */
.check-group{margin-bottom:20px}
.cg-title{font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cg-title::after{content:'';flex:1;height:1px;background:rgba(168,135,58,.2)}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:2px;border:1px solid var(--line2);background:var(--f);cursor:pointer;transition:all .15s;margin-bottom:6px}
.check-item:hover{border-color:rgba(26,23,20,.12)}
.check-item.on{background:rgba(45,122,79,.05);border-color:rgba(45,122,79,.28)}
.ci-box{width:16px;height:16px;border-radius:2px;border:1.5px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-item.on .ci-box{background:#2D7A4F;border-color:#2D7A4F}
.ci-box svg{display:none}
.check-item.on .ci-box svg{display:block}
.ci-text{font-size:12px;color:var(--ink2);line-height:1.55}

/* PROGRESS BAND */
.prog-band{display:flex;align-items:center;gap:10px;padding:14px 22px;background:var(--f);border-bottom:1px solid var(--line)}
.pb-bar{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.pb-fill{height:100%;border-radius:2px;transition:width .4s}
.pb-pct{font-size:11px;color:var(--ink3);min-width:32px}
.pb-label{font-size:10px;color:var(--ink3);letter-spacing:.5px}

/* DÉFIS */
.defis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.defi-card{background:var(--f);border:1px solid var(--line);border-radius:2px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative}
.defi-card:hover{border-color:rgba(26,23,20,.18)}
.defi-card.on{border-color:rgba(45,122,79,.35);background:rgba(45,122,79,.05)}
.defi-num{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.defi-text{font-size:11px;color:var(--ink2);line-height:1.55}
.defi-badge{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:#2D7A4F;display:none;align-items:center;justify-content:center}
.defi-card.on .defi-badge{display:flex}

/* BILAN */
.bilan-section{margin-bottom:28px}
.bs-title{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--ink);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.question-evo{padding:14px 16px;background:var(--f);border:1px solid var(--line);border-radius:2px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center}
.qe-text{font-size:12px;color:var(--ink2);line-height:1.55}
.qe-score{text-align:center}
.qe-val{font-family:var(--serif);font-size:18px;font-weight:300}
.qe-lbl{font-size:8px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase}
.qe-arrow{font-family:var(--serif);font-size:20px;color:var(--ink3);padding:0 4px}
.evo-badge{font-size:9px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap}

/* NOTES BILAN */
.bilan-note{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:2px;background:var(--f);font-family:var(--sans);font-size:12px;color:var(--ink2);resize:vertical;min-height:70px;outline:none;margin-top:8px}
.bilan-note:focus{border-color:rgba(168,135,58,.4)}

/* SPA COMP */
.spa-comp{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:24px;padding:20px;background:var(--f2);border:1px solid var(--line);border-radius:2px}
.spa-val{text-align:center}
.spa-n{font-family:var(--serif);font-size:40px;font-weight:300;line-height:1}
.spa-l{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-top:4px}
.spa-mid{text-align:center;font-family:var(--serif);font-size:28px;color:var(--ink3)}
.spa-delta{font-family:var(--serif);font-size:18px;font-weight:300;margin-top:6px}

/* PRINT */
@media print{
  #login,#app .sb,.topbar,.btn,.no-print,.parcours-tabs{display:none!important}
  #app{display:block!important}.main{margin:0}
  body{background:#fff}.ec-body{display:block!important}
}
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--dark);color:var(--f);padding:11px 18px;border-radius:2px;border-left:3px solid var(--gold);font-size:12px;transform:translateY(14px);opacity:0;transition:all .25s;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
@media(max-width:900px){.sb{display:none}.main{margin-left:0}.defis-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="login">
  <div class="chroma" style="position:absolute;top:0;left:0;right:0"><div style="background:#B5312A"></div><div style="background:#C4581F"></div><div style="background:#B8930A"></div><div style="background:#2D7A4F"></div><div style="background:#1D5F8A"></div><div style="background:#5C3280"></div><div style="background:#7A3594"></div></div>
  <div class="lcard">
    <p class="llogo">V.A.L.E.U.R©</p>
    <h1 class="ltitle">Espace Cabinet</h1>
    <input type="password" class="lpwd" id="lpwd" placeholder="Mot de passe" autocomplete="current-password">
    <button class="lbtn" onclick="doLogin()">Accéder</button>
    <p id="lerr" style="font-size:11px;color:#E57373;margin-top:10px;display:none">Mot de passe incorrect</p>
  </div>
</div>

<div id="app">
  <aside class="sb">
    <div class="sb-head"><div class="sb-brand">V.A.L.E.U.R©</div></div>
    <div class="chroma"><div style="background:#B5312A"></div><div style="background:#C4581F"></div><div style="background:#B8930A"></div><div style="background:#2D7A4F"></div><div style="background:#1D5F8A"></div><div style="background:#5C3280"></div><div style="background:#7A3594"></div></div>
    <div style="padding:16px 0;flex:1">
      <a class="sb-item" href="index.html">← Dashboard</a>
      <a class="sb-item" id="sb-patient" href="#">Dossier patient</a>
      <div class="sb-item active">Parcours V.A.L.E.U.R©</div>
      <a class="sb-item" id="sb-masque" href="#">Suivi masque</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <a href="index.html" style="font-size:11px;color:rgba(26,23,20,.35);text-decoration:none;transition:color .15s" onmouseover="this.style.color='#1A1714'" onmouseout="this.style.color='rgba(26,23,20,.35)'">Cabinet</a>
        <span style="color:rgba(26,23,20,.2)">›</span>
        <a href="#" id="_bc_patient" style="font-size:11px;color:rgba(26,23,20,.35);text-decoration:none;transition:color .15s" onmouseover="this.style.color='#1A1714'" onmouseout="this.style.color='rgba(26,23,20,.35)'">Patient</a>
        <span style="color:rgba(26,23,20,.2)">›</span>
        <span id="_bc" style="font-size:11px;color:#1A1714;font-weight:500">Parcours V.A.L.E.U.R©</span>
      </div>
      <div style="display:flex;gap:8px" class="no-print">
        <button class="btn btn-ghost btn-sm" onclick="window.print()">Imprimer</button>
        <button class="btn btn-gold btn-sm" onclick="saveAll()">Enregistrer</button>
      </div>
    </div>
    <div class="content" id="content">
      <div style="text-align:center;padding:80px;font-family:var(--serif);font-size:18px;color:var(--ink3);font-style:italic">Chargement du parcours...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://valeur-backend-api.vercel.app/api/cabinet';
const TOKEN='ValeurCabinet2026';
const PWD='ValeurCabinet2026';
const MC={rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
const ML={rouge:'Rouge',orange:'Orange',jaune:'Jaune',vert:'Vert',bleu:'Bleu',indigo:'Indigo',violet:'Violet'};

// NIVEAUX D'EMPRISE — libellés V.A.L.E.U.R©
const NIVEAUX={0:'Silencieux',1:'Discret',2:'Présent',3:'Actif',4:'Très actif'};
const NIVEAUX_COLOR={0:'#2D7A4F',1:'#5C3280',2:'#B8930A',3:'#C4581F',4:'#B5312A'};

// QUESTIONS CLÉS PAR MASQUE (items originaux du questionnaire — non reformulés)
const QUESTIONS_CLES={
  rouge:[
    {id:'R1',text:'Je surveille constamment mes battements cardiaques, ma respiration ou ma température corporelle.'},
    {id:'R2',text:'Lorsque je ressens une sensation corporelle inhabituelle, j\'anticipe immédiatement le pire diagnostic.'},
    {id:'R7',text:'La moindre douleur corporelle déclenche immédiatement des pensées de maladie grave (cancer, infarctus, AVC).'},
    {id:'R9',text:'J\'éprouve une peur récurrente de mourir subitement sans signe avant-coureur.'},
    {id:'R12',text:'J\'ai des difficultés de concentration car mon attention est captée par mes sensations corporelles.'}
  ],
  orange:[
    {id:'O3',text:'J\'éprouve des difficultés à identifier et nommer précisément ce que je ressens (peur, colère, tristesse, joie).'},
    {id:'O4',text:'Je maintiens un niveau d\'activité constant pour éviter de me retrouver seul(e) avec mes émotions.'},
    {id:'O6',text:'Je me sens émotionnellement engourdi(e), comme si j\'observais ma propre vie de l\'extérieur.'},
    {id:'O9',text:'Je minimise systématiquement mes difficultés en répondant « ça va » même en situation de détresse.'},
    {id:'O12',text:'Je me sens déconnecté(e) de mon corps et de ses manifestations sensorielles.'}
  ],
  jaune:[
    {id:'J2',text:'L\'incertitude ou l\'absence d\'information sur ce qui va advenir génère une anxiété considérable.'},

    {id:'J8',text:'Les surprises, même positives ou agréables, génèrent un inconfort psychologique.'},

  ],
  vert:[

    {id:'V4',text:'Je suis incapable d\'affirmer mes besoins ou désirs authentiques par crainte de générer un conflit.'},
    {id:'V9',text:'J\'analyse constamment les comportements d\'autrui à la recherche d\'indices de rejet potentiel.'},
    {id:'V11',text:'Je m\'efface systématiquement et sacrifie mes propres besoins pour le confort relationnel d\'autrui.'},
    {id:'V2',text:'Un message sans réponse rapide déclenche une anxiété et une rumination importantes.'}
  ],
  bleu:[
    {id:'B2',text:'Déléguer m\'est extrêmement difficile car je suis convaincu(e) qu\'autrui ne fera pas aussi bien.'},
    {id:'B3',text:'Je ressens une irritation viscérale et profonde lorsque les événements m\'échappent.'},
    {id:'B7',text:'Je ressens une anxiété majeure ou un sentiment d\'impuissance lorsque je dois dépendre d\'autrui.'},
    {id:'B11',text:'J\'épuise mon entourage en portant l\'ensemble des responsabilités et en refusant l\'aide.'},
    {id:'B12',text:'L\'idée d\'être dans une position d\'impuissance ou sans influence me terrifie profondément.'}
  ],
  indigo:[

    {id:'I7',text:'Une erreur mineure me fait intensément douter de ma compétence globale et de ma valeur.'},
    {id:'I11',text:'Mon dialogue interne est sévèrement critique, punitif et auto-flagellant.'},
    {id:'I1',text:'Je procrastine ou diffère mes actions par crainte que mon travail ne soit pas suffisamment parfait.'},
    {id:'I4',text:'Je me compare constamment à autrui et me perçois toujours comme inférieur(e) ou insuffisant(e).'}
  ],
  violet:[
    {id:'Vi1',text:'Je ne sais plus véritablement qui je suis en dehors des rôles sociaux que j\'incarne.'},
    {id:'Vi6',text:'Je me sens étranger(ère) à ma propre existence, comme si je l\'observais de l\'extérieur.'},
    {id:'Vi7',text:'J\'ai porté tant de masques que l\'idée d\'être authentiquement moi-même semble terrifiante.'},
    {id:'Vi10',text:'Je vis en mode automatique, sans véritable présence, choix conscient ou implication émotionnelle.'},
    {id:'Vi2',text:'Lorsque je suis seul(e) et silencieux(se), j\'éprouve un vide, une absence ou un manque de sens.'}
  ]
};

// RESSOURCES INVERSÉES par masque
const RESSOURCES_INV={
  rouge:'Votre capacité à percevoir finement les signaux corporels est une force. Lorsqu\'elle se libère de la vigilance, elle devient une présence incarnée rare.',
  orange:'Votre capacité à fonctionner et à tenir est réelle. Lorsqu\'elle s\'allège, le contact avec vos émotions est disponible — vous pouvez le ressentir dans les moments de calme.',
  jaune:'Votre sens de l\'organisation et votre capacité d\'anticipation sont des forces. Elles peuvent se mettre au service de la vie plutôt que contre elle.',

  violet:'En vous réside une profondeur et une capacité de transformation que peu de personnes ont. Sous les rôles, votre essence est là — et elle n\'attend que d\'être habitée.'
};

// ÉTAPES DU PARCOURS
const ETAPES_VALEUR=[
  {key:'V',nom:'VOIR',desc:'Reconnaître le masque à l\'œuvre — lui donner un nom, voir le déclencheur.',sem:'Semaines 1–2',
   indicateurs:['Nomme son masque spontanément quand il s\'active','Identifie le déclencheur précis d\'une réaction récente','Distingue la réaction automatique d\'un choix conscient','Reconnaît le schéma en temps réel ("là, c\'est mon masque")','Peut nommer 3 situations déclenchantes récurrentes']},
  {key:'A',nom:'ACCUEILLIR',desc:'Rester avec ce qu\'on ressent — sans le fuir, sans le minimiser.',sem:'Semaines 3–4',

  {key:'L',nom:'LOCALISER',desc:'Descendre dans le corps — trouver où ça vit, physiquement.',sem:'Semaines 5–6',

  {key:'E',nom:'EXPLORER',desc:'Identifier le conflit entre les deux parts — celle qui protège et celle qui veut vivre.',sem:'Semaines 7–8',

}

async function api(action,body={},method='POST',retries=2){
  const ctrl=new AbortController();
  const tmo=setTimeout(()=>ctrl.abort(),12000);
  try{
    const isGet=method==='GET';
    const url=isGet?`${API}?action=${action}&${new URLSearchParams(body)}`:API;
    const r=await fetch(url,{method,signal:ctrl.signal,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body:isGet?undefined:JSON.stringify({action,...body})});
    clearTimeout(tmo);
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`);}
    return r.json();
  }catch(e){
    clearTimeout(tmo);
    if(retries>0&&e.name!=='AbortError'){
      await new Promise(r=>setTimeout(r,700));
      return api(action,body,method,retries-1);
    }
    throw e;
  }
}

}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='info',dur=3500){
  let stack=document.getElementById('_ts');
  if(!stack){
    stack=document.createElement('div');
    stack.id='_ts';
    stack.style.cssText='position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px';
    document.body.appendChild(stack);
  }
  const t=document.createElement('div');
  const borderColor=type==='ok'?'#2D7A4F':type==='err'?'#B5312A':'#A8873A';
  const icon=type==='ok'?'✓':type==='err'?'✕':'·';
  t.style.cssText=`background:#18130F;color:rgba(245,241,235,.9);padding:11px 17px;
    border-radius:3px;border-left:3px solid ${borderColor};font-size:12px;
    box-shadow:0 6px 24px rgba(0,0,0,.2);display:flex;gap:9px;align-items:center;
    max-width:320px;font-family:'DM Sans',sans-serif;animation:_tIn .2s ease;`;
  t.innerHTML=`<b style="flex-shrink:0">${icon}</b><span>${msg}</span>`;
  if(!document.getElementById('_tStyle')){
    const s=document.createElement('style');
    s.id='_tStyle';
    s.textContent='@keyframes _tIn{from{transform:translateX(14px);opacity:0}to{transform:none;opacity:1}}';
    document.head.appendChild(s);
  }
  stack.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .25s';t.style.opacity='0';setTimeout(()=>t.remove(),250);},dur);
}

// ── NAVIGATION BREADCRUMB ─────────────────────────────────────
function setBreadcrumb(items){
  const el=document.getElementById('_bc');
  if(!el)return;
  el.innerHTML=items.map((item,i)=>{
    if(i===items.length-1)
      return `<span style="color:var(--ink,#1A1714);font-weight:500">${item.label}</span>`;
    return `<a href="${item.href||'#'}" style="color:rgba(26,23,20,.4);text-decoration:none;transition:color .15s"
      onmouseover="this.style.color='#1A1714'" onmouseout="this.style.color='rgba(26,23,20,.4)'">${item.label}</a>
      <span style="color:rgba(26,23,20,.2);margin:0 2px">›</span>`;
  }).join('');
}</script>
