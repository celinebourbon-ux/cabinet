<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suivi de séance — Cabinet V.A.L.E.U.R©</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --f:#F5F1EB;--f2:#EDE8DF;--f3:#E2DBC8;
  --ink:#1A1714;--ink2:rgba(26,23,20,.65);--ink3:rgba(26,23,20,.35);
  --dark:#1C1916;--dark2:#2A2520;
  --gold:#A8873A;
  --line:rgba(26,23,20,.08);--line2:rgba(26,23,20,.04);
  --vert:#2D7A4F;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --sb:256px;--nav:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--f);color:var(--ink);-webkit-font-smoothing:antialiased}
.chroma{display:flex;height:3px;width:100%}
.chroma div{flex:1}

/* AUTH */
#login{position:fixed;inset:0;z-index:900;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column}
.lcard{background:rgba(245,241,235,.04);border:1px solid rgba(168,135,58,.2);border-radius:2px;padding:40px 44px;width:min(380px,92vw);text-align:center}
.llogo{font-family:var(--serif);font-size:11px;letter-spacing:5px;text-transform:uppercase;color:rgba(168,135,58,.7);margin-bottom:20px}
.ltitle{font-family:var(--serif);font-size:22px;font-weight:300;color:rgba(245,241,235,.85);margin-bottom:20px}
.lpwd{width:100%;padding:11px 14px;background:rgba(245,241,235,.05);border:1px solid rgba(168,135,58,.22);border-radius:2px;font-family:var(--sans);font-size:13px;color:rgba(245,241,235,.8);outline:none;text-align:center;letter-spacing:3px;margin-bottom:14px}
.lpwd:focus{border-color:rgba(168,135,58,.5)}
.lbtn{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:2px;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase}

/* LAYOUT */
#app{display:none;min-height:100vh}
#app.on{display:flex}
.sb{width:var(--sb);min-height:100vh;background:var(--dark);flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(245,241,235,.05)}
.sb-brand{font-family:var(--serif);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(168,135,58,.75)}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;font-size:12px;color:rgba(245,241,235,.42);border-left:2px solid transparent;transition:all .15s;text-decoration:none}
.sb-item:hover{color:rgba(245,241,235,.75);background:rgba(245,241,235,.03)}
.sb-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(168,135,58,.07)}
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--nav);background:var(--f);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.tb-back{font-size:11px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:6px}
.tb-back:hover{color:var(--ink)}
.content{padding:28px 32px 60px}

/* BOUTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:2px;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;border:none;transition:all .18s}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#C4A550}
.btn-ghost{background:transparent;color:var(--ink3);border:1px solid var(--line)}.btn-ghost:hover{color:var(--ink);border-color:rgba(26,23,20,.2)}
.btn-sm{padding:6px 12px;font-size:9px}
.btn-danger{background:rgba(181,49,42,.08);color:#B5312A;border:1px solid rgba(181,49,42,.2)}.btn-danger:hover{background:rgba(181,49,42,.15)}

/* EN-TÊTE PATIENT */
.pt-bar{background:var(--f2);border:1px solid var(--line);border-radius:2px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;position:relative;overflow:hidden}
.pt-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--MCOLOR,var(--gold))}
.pt-init{font-family:var(--serif);font-size:22px;font-weight:300}
.pt-masque{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:2px}

/* HISTORIQUE COMPACT */
.hist-band{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:28px;
}
.hist-card{
  flex-shrink:0;background:var(--f2);border:1px solid var(--line);border-radius:2px;
  padding:12px 16px;cursor:pointer;transition:all .15s;min-width:130px;
}
.hist-card:hover{border-color:rgba(168,135,58,.4);background:var(--f3)}
.hist-card.selected{border-color:var(--gold);background:rgba(168,135,58,.07)}
.hist-date{font-size:10px;color:var(--ink3);margin-bottom:4px}
.hist-intensite{display:flex;gap:2px;margin-bottom:4px}
.hist-dot{width:6px;height:6px;border-radius:50%}
.hist-nb{font-size:10px;color:var(--ink3)}

/* GRILLE PRINCIPALE */
.grid-seance{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}

/* FICHE SÉANCE */
.fiche-card{background:var(--f2);border:1px solid var(--line);border-radius:2px}
.fc-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.fc-title{font-family:var(--serif);font-size:17px;font-weight:300}
.fc-date{font-size:12px;color:var(--ink3)}
.fc-body{padding:20px}

/* INTENSITÉ */
.intensite-wrap{margin-bottom:24px}
.int-label{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:block}
.int-scale{display:flex;gap:6px;align-items:center}
.int-btn{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);
  background:var(--f);cursor:pointer;font-size:12px;font-weight:500;
  color:var(--ink3);transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.int-btn.on{background:var(--MCOLOR,var(--gold));border-color:var(--MCOLOR,var(--gold));color:#fff}
.int-lbl-l{font-size:10px;color:var(--ink3);margin-right:4px}
.int-lbl-r{font-size:10px;color:var(--ink3);margin-left:4px}

/* SECTION COMPORTEMENTS */
.section-title-sm{
  font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:20px;
}
.section-title-sm::after{content:'';flex:1;height:1px;background:rgba(168,135,58,.2)}
.check-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.check-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:2px;border:1px solid var(--line2);
  background:var(--f);cursor:pointer;transition:all .15s;
}
.check-item:hover{border-color:rgba(26,23,20,.12);background:rgba(237,232,223,.5)}
.check-item.checked{
  background:rgba(168,135,58,.06);
  border-color:rgba(168,135,58,.3);
}
.check-box{
  width:16px;height:16px;border-radius:2px;border:1.5px solid var(--line);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.check-item.checked .check-box{
  background:var(--gold);border-color:var(--gold);
}
.check-box svg{display:none}
.check-item.checked .check-box svg{display:block}
.check-text{font-size:12px;color:var(--ink2);line-height:1.55}
.check-item.ressource:hover{border-color:rgba(45,122,79,.25)}
.check-item.ressource.checked{background:rgba(45,122,79,.06);border-color:rgba(45,122,79,.3)}
.check-item.ressource.checked .check-box{background:#2D7A4F;border-color:#2D7A4F}

/* NOTES */
.notes-seance{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:2px;
  background:var(--f);font-family:var(--sans);font-size:12px;color:var(--ink2);
  resize:vertical;min-height:80px;outline:none;margin-top:16px;
}
.notes-seance:focus{border-color:rgba(168,135,58,.4)}

/* PANNEAU DROITE */
.right-stack{display:flex;flex-direction:column;gap:14px}
.mini-card{background:var(--f2);border:1px solid var(--line);border-radius:2px}
.mc-head{padding:12px 16px;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:14px;font-weight:300;color:var(--ink)}
.mc-body{padding:12px 16px}

/* COURBE INTENSITÉ */
.courbe-wrap{display:flex;align-items:flex-end;gap:4px;height:50px;padding:4px 0}
.courbe-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.courbe-bar{width:100%;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px}
.courbe-label{font-size:8px;color:var(--ink3);white-space:nowrap}

/* RÉSUMÉ COMPORTEMENTS */
.recap-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--line2);font-size:11px;
}
.recap-item:last-child{border-bottom:none}
.recap-bar{width:60px;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.recap-fill{height:100%;border-radius:2px;background:var(--gold)}

/* PRINT */
@media print{
  #login,#app .sb,.topbar,.btn,.no-print,#hist-band-wrap{display:none!important}
  #app{display:block!important}
  .main{margin:0}
  .grid-seance{grid-template-columns:1fr}
  .right-stack{display:none}
  body{background:#fff}
  .fiche-card{border:none;background:#fff}
}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--dark);color:var(--f);padding:11px 18px;border-radius:2px;border-left:3px solid var(--gold);font-size:12px;transform:translateY(14px);opacity:0;transition:all .25s;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}

@media(max-width:900px){
  .sb{display:none}.main{margin-left:0}
  .grid-seance{grid-template-columns:1fr}
  .right-stack{display:none}
}
</style>
</head>

<script>
const API   = 'https://valeur-backend-api.vercel.app/api/cabinet';
const TOKEN = 'ValeurCabinet2026';
const PWD   = 'ValeurCabinet2026';
const MC    = {rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
const ML    = {rouge:'Rouge',orange:'Orange',jaune:'Jaune',vert:'Vert',bleu:'Bleu',indigo:'Indigo',violet:'Violet'};

const MANIFESTATIONS = {
  rouge:{label:'Rouge',color:'#B5312A',peur:'Mort et maladie',
    comportements:['Vérifie ses symptômes corporels plusieurs fois en séance','Interprète des sensations neutres comme des signaux d\'alarme','Évoque des consultations médicales répétées récentes','Exprime une anxiété anticipatoire autour de sa santé','Cherche à être rassuré·e sur ses sensations corporelles','Décrit une hypervigilance somatique au quotidien','Rapporte des insomnies liées à des préoccupations de santé','Évite certaines activités par peur d\'aggraver un état'],
    ressources:['Connexion corporelle fine et riche (ressource)','Capacité à localiser précisément les sensations','Conscience intéroceptive développée','Attention soutenue au signal corporel']},
  orange:{label:'Orange',color:'#C4581F',peur:'Souffrance psychique',
    comportements:['Change de sujet quand la conversation devient émotionnelle','Décrit ses états de façon intellectualisée, sans affect','Utilise l\'humour pour esquiver une émotion en séance','Rapporte une difficulté à pleurer ou à se laisser toucher','Maintient une activité constante pour éviter le vide','Exprime un sentiment d\'engourdissement émotionnel','Décrit une dissociation légère ("je m\'observe de l\'extérieur")','Ne nomme pas ses émotions spontanément'],
    ressources:['Grande capacité de régulation en surface (ressource)','Résilience fonctionnelle haute','Intelligence et mentalisation développées','Capacité d\'observation de soi (si orientée)']},
  jaune:{label:'Jaune',color:'#B8930A',peur:'Inconnu et incertitude',
    comportements:['Planifie et anticipe avant même de commencer la séance','Pose de nombreuses questions pour "savoir exactement"','Exprime un inconfort face aux exercices ouverts','Cherche à contrôler le déroulement de la séance','Décrit une rumination anticipatoire intense au quotidien','Rapporte des rituels de vérification (listes, re-vérifications)','Évite les décisions en l\'absence de certitude','Se dit épuisé·e par la gestion du "et si"'],
    ressources:['Rigueur et organisation (ressource)','Fiabilité et sens des responsabilités','Capacité de prévoyance élevée','Attention au détail mobilisable']},
  vert:{label:'Vert',color:'#2D7A4F',peur:'Rejet et abandon',
    comportements:['S\'adapte en permanence à ce qu\'il/elle perçoit de mes attentes','Minimise ses besoins ou ne les exprime pas spontanément','Cherche validation ou approbation lors des exercices','Exprime une peur de "mal faire" en séance','Décrit des conflits évités pour ne pas perdre un lien','Rapporte une difficulté à dire non dans la vie quotidienne','Se décrit comme "trop sensible" au regard des autres','S\'oublie pour maintenir la relation'],
    ressources:['Empathie et sensibilité relationnelle (ressource)','Capacité d\'écoute et de présence à l\'autre','Profonde capacité d\'amour et de soin','Finesse dans la lecture des relations']},
  bleu:{label:'Bleu',color:'#1D5F8A',peur:'Impuissance',
    comportements:['Prend le contrôle du rythme ou de la direction de la séance','Résiste aux exercices de lâcher-prise ou de délégation','Décrit un besoin fort de gérer seul·e, sans aide','Rapporte une difficulté à recevoir (aide, soin, affection)','Exprime une anxiété quand les choses "ne dépendent pas de lui/elle"','Se dit épuisé·e de tout porter mais incapable de poser le poids','Minimise la gravité pour maintenir une apparence de maîtrise','Interprète la faiblesse comme un danger'],
    ressources:['Leadership et capacité d\'action (ressource)','Sens de la responsabilité élevé','Endurance et capacité à tenir','Fiabilité pour les autres']},
  indigo:{label:'Indigo',color:'#5C3280',peur:'Échec et inadéquation',
    comportements:['Se juge sévèrement lors des exercices ("c\'est nul", "j\'ai raté")','Compare ses progrès à un standard élevé imaginaire','Hésite longuement avant de répondre par peur de "mal dire"','Rapporte une procrastination liée à la peur de l\'évaluation','Décrit un syndrome de l\'imposteur dans sa vie professionnelle','Ne reconnaît pas ses réussites comme légitimes','Perfectionne à l\'excès avant de livrer ou partager','S\'interdit de tenter pour ne pas risquer l\'échec confirmé'],
    ressources:['Excellence et exigence (ressource si orientées)','Capacité de travail et de persévérance','Standards élevés mobilisables positivement','Sens critique et discernement fins']},
  violet:{label:'Violet',color:'#7A3594',peur:'Perte d\'identité',
    comportements:['Décrit un sentiment de ne pas savoir "qui il/elle est vraiment"','Exprime une discontinuité entre ses différents rôles de vie','Rapporte une difficulté à répondre à "qu\'est-ce que vous voulez, vous ?"','Se décrit différemment selon les contextes (professionnel, familial, intime)','Exprime une angoisse existentielle diffuse et difficile à nommer','Cherche en permanence sa "vraie nature" sans la trouver','Décrit une impression de jouer un rôle dans sa propre vie','Rapporte une perte de sens ou de direction'],
    ressources:['Profondeur et complexité intérieure (ressource)','Capacité de questionnement et de remise en question','Ouverture à la transformation','Finesse philosophique et existentielle']}
};

const params = new URLSearchParams(location.search);
const PATIENT_ID = parseInt(params.get('patient_id'));
let PATIENT = null, MASQUE = null, HIST = [], selectedHist = null;
let checkedComportements = new Set(), checkedRessources = new Set(), intensite = 3;
let notesVal = '';

// AUTH
function doLogin(){
  const v=document.getElementById('lpwd').value;
  if(v===PWD){sessionStorage.setItem('cab','1');document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');loadData()}
  else{document.getElementById('lerr').style.display='block';document.getElementById('lpwd').value=''}
}
document.getElementById('lpwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function logout(){sessionStorage.removeItem('cab');location.reload()}
if(sessionStorage.getItem('cab')==='1'){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');loadData()}

async function api(action,body={},method='POST',retries=2){
  const ctrl=new AbortController();
  const tmo=setTimeout(()=>ctrl.abort(),12000);
  try{
    const isGet=method==='GET';
    const url=isGet?`${API}?action=${action}&${new URLSearchParams(body)}`:API;
    const r=await fetch(url,{method,signal:ctrl.signal,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body:isGet?undefined:JSON.stringify({action,...body})});
    clearTimeout(tmo);
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`);}
    return r.json();
  }catch(e){
    clearTimeout(tmo);
    if(retries>0&&e.name!=='AbortError'){
      await new Promise(r=>setTimeout(r,700));
      return api(action,body,method,retries-1);
    }
    throw e;
  }
}
async function loadData(){
  if(!PATIENT_ID || isNaN(PATIENT_ID)){
    document.getElementById('content').innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:32px;opacity:.25;margin-bottom:16px">⚠</div><div style="font-family:var(--serif);font-size:20px;font-weight:300;color:#1A1714;margin-bottom:8px">Aucun patient sélectionné</div><div style="font-size:12px;color:rgba(26,23,20,.35);margin-bottom:24px">Ouvrez cet outil depuis un dossier patient.</div><a href=\"index.html\" style=\"display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#14100D;color:#F5F1EB;border-radius:3px;text-decoration:none;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase\">← Tableau de bord</a></div>';
    return;
  }
  try{
    const d = await api('get_patient',{id:PATIENT_ID},'GET');
    PATIENT = d.patient;
    MASQUE = PATIENT.masque || null;
    HIST = d.manifestations || [];

    // Mettre à jour les liens sidebar
    document.getElementById('_bc_patient').href=`patient.html?id=${PATIENT_ID}`;
    document.getElementById('_bc_patient').textContent=PATIENT.initiales;
    document.getElementById('sb-patient-link').href = `patient.html?id=${PATIENT_ID}`;
    document.getElementById('sb-valeur-link').href = `suivi_valeur.html?patient_id=${PATIENT_ID}`;
    document.getElementById('back-btn').onclick = ()=>window.location.href=`patient.html?id=${PATIENT_ID}`;

    render();
  }catch(e){
    const el=document.getElementById('content');
    if(el) el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:28px;opacity:.2;margin-bottom:14px">⚠</div><div style="font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:8px">Erreur de chargement</div><div style="font-size:11px;color:var(--ink3);font-family:monospace;margin-bottom:20px">'+e.message+'</div><div style="display:flex;gap:10px;justify-content:center"><button onclick="loadData()" style="display:inline-flex;padding:8px 14px;border-radius:3px;background:#1A1714;color:#F5F1EB;border:none;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase">Réessayer</button><a href="index.html" style="display:inline-flex;align-items:center;padding:8px 14px;border-radius:3px;border:1px solid rgba(26,23,20,.1);color:rgba(26,23,20,.5);text-decoration:none;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase">← Cabinet</a></div></div>';
  }
}

function render(){
  const masque = MASQUE || 'vert'; // défaut si pas encore de bilan
  const mc = MC[masque] || '#A8873A';
  const data = MANIFESTATIONS[masque] || MANIFESTATIONS.vert;
  const today = new Date().toLocaleDateString('fr-FR');

  document.getElementById('content').innerHTML = `
    <!-- EN-TÊTE PATIENT -->
    <div class="pt-bar" style="--MCOLOR:${mc}">
      <div>
        <span class="pt-init">${PATIENT.initiales}</span>
        ${PATIENT.age?`<span style="font-size:13px;color:var(--ink3);margin-left:10px">${PATIENT.age} ans</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${masque?`<span class="pt-masque" style="background:${mc}18;color:${mc};border:1px solid ${mc}35">Masque ${ML[masque]||masque}</span>`:''}
        <span style="font-size:11px;color:var(--ink3)">Aujourd'hui · ${today}</span>
      </div>
    </div>

    <!-- HISTORIQUE DES SÉANCES -->
    <div id="hist-band-wrap">
      <div style="font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px">Historique des séances (${HIST.length})</div>
      <div class="hist-band" id="hist-band">
        <div class="hist-card" id="new-seance-card" onclick="selectSeance(null)" style="border-style:dashed;min-width:120px;text-align:center;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px">
          <div style="font-size:18px;color:var(--gold)">+</div>
          <div style="font-size:10px;color:var(--ink3)">Nouvelle séance</div>
        </div>
        ${HIST.map(h=>{
          const d=new Date(h.date_seance);
          const nb=(h.comportements_coches||[]).length;
          return `<div class="hist-card" onclick="selectSeance(${h.id})" id="hcard-${h.id}">
            <div class="hist-date">${d.toLocaleDateString('fr-FR')}</div>
            <div class="hist-intensite">${[1,2,3,4,5].map(i=>`<div class="hist-dot" style="background:${i<=h.intensite?mc:'var(--line)'}"></div>`).join('')}</div>
            <div class="hist-nb">${nb} signe${nb>1?'s':''} coché${nb>1?'s':''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- GRILLE SÉANCE -->
    <div class="grid-seance" id="seance-grid">
      <!-- FICHE -->
      <div class="fiche-card">
        <div class="fc-head">
          <div class="fc-title" id="fc-title">Nouvelle séance</div>
          <div class="fc-date" id="fc-date">${today}</div>
        </div>
        <div class="fc-body">
          <!-- INTENSITÉ -->
          <span class="int-label">Intensité globale du masque observée en séance</span>
          <div class="int-scale">
            <span class="int-lbl-l">Légère</span>
            ${[1,2,3,4,5].map(i=>`<button class="int-btn ${i===3?'on':''}" style="--MCOLOR:${mc}" id="int-${i}" onclick="setIntensite(${i})">${i}</button>`).join('')}
            <span class="int-lbl-r">Forte</span>
          </div>

          <!-- COMPORTEMENTS -->
          <div class="section-title-sm">Manifestations observées en séance</div>
          <div class="check-list" id="comportements-list">
            ${data.comportements.map((c,i)=>`
              <div class="check-item" id="comp-${i}" onclick="toggleComp(${i})">
                <div class="check-box">
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="check-text">${c}</span>
              </div>`).join('')}
          </div>

          <!-- RESSOURCES -->
          <div class="section-title-sm" style="color:#2D7A4F">Ressources / forces observées</div>
          <div class="check-list" id="ressources-list">
            ${data.ressources.map((r,i)=>`
              <div class="check-item ressource" id="res-${i}" onclick="toggleRes(${i})">
                <div class="check-box" style="border-color:rgba(45,122,79,.3)">
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="check-text" style="color:rgba(26,23,20,.65)">${r}</span>
              </div>`).join('')}
          </div>

          <!-- NOTES -->
          <div class="section-title-sm">Notes cliniques de séance</div>
          <textarea class="notes-seance" id="notes-seance" placeholder="Observations cliniques, points importants, orientations pour la prochaine séance..."></textarea>

          <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center" class="no-print">
            <div id="delete-btn-wrap"></div>
            <button class="btn btn-gold" onclick="saveSeance()">Enregistrer la séance</button>
          </div>
        </div>
      </div>

      <!-- PANNEAU DROITE -->
      <div class="right-stack no-print">

        <!-- COURBE D'ÉVOLUTION -->
        ${HIST.length>0?`<div class="mini-card">
          <div class="mc-head">Évolution de l'intensité</div>
          <div class="mc-body">
            <div class="courbe-wrap" id="courbe-wrap">
              ${HIST.slice().reverse().slice(-8).map(h=>`
                <div class="courbe-bar-wrap">
                  <div class="courbe-bar" style="height:${h.intensite/5*40}px;background:${mc};opacity:0.7"></div>
                  <div class="courbe-label">${new Date(h.date_seance).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>`:''}

        <!-- FRÉQUENCE DES COMPORTEMENTS -->
        ${HIST.length>1?`<div class="mini-card">
          <div class="mc-head">Manifestations les plus fréquentes</div>
          <div class="mc-body">
            ${(()=>{
              const data2 = MANIFESTATIONS[masque];
              const freq = data2.comportements.map((_,i)=>{
                const count = HIST.filter(h=>(h.comportements_coches||[]).includes(i)).length;
                return {i, count, pct: HIST.length?Math.round(count/HIST.length*100):0};
              }).sort((a,b)=>b.count-a.count).slice(0,4);
              return freq.map(f=>`<div class="recap-item">
                <span style="font-size:11px;color:var(--ink2);flex:1;padding-right:8px;line-height:1.4">${data2.comportements[f.i].substring(0,45)}…</span>
                <div>
                  <div class="recap-bar"><div class="recap-fill" style="width:${f.pct}%;background:${mc}"></div></div>
                  <div style="font-size:9px;color:var(--ink3);text-align:right;margin-top:1px">${f.count}×</div>
                </div>
              </div>`).join('');
            })()}
          </div>
        </div>`:''}

        <!-- CONSEILS SÉANCE -->
        <div class="mini-card">
          <div class="mc-head">Axes de travail suggérés</div>
          <div class="mc-body">
            <div style="font-size:11px;color:var(--ink2);line-height:1.7" id="conseils-text">
              Cochez les manifestations observées pour afficher les axes de travail recommandés.
            </div>
          </div>
        </div>

      </div>
    </div>
  `;

  setIntensite(3);
}

// INTERACTIONS
function setIntensite(v){
  intensite = v;
  [1,2,3,4,5].forEach(i=>{
    const b=document.getElementById('int-'+i);
    if(b){
      b.classList.toggle('on', i<=v);
      const masque = MASQUE||'vert';
      b.style.setProperty('--MCOLOR', MC[masque]);
    }
  });
}

function toggleComp(i){
  if(checkedComportements.has(i)) checkedComportements.delete(i);
  else checkedComportements.add(i);
  const el=document.getElementById('comp-'+i);
  if(el) el.classList.toggle('checked', checkedComportements.has(i));
  updateConseils();
}

function toggleRes(i){
  if(checkedRessources.has(i)) checkedRessources.delete(i);
  else checkedRessources.add(i);
  const el=document.getElementById('res-'+i);
  if(el) el.classList.toggle('checked', checkedRessources.has(i));
}

function updateConseils(){
  const n = checkedComportements.size;
  const el = document.getElementById('conseils-text');
  if(!el) return;
  if(n===0){el.innerHTML='Cochez les manifestations observées pour afficher les axes de travail recommandés.';return}
  const masque = MASQUE||'vert';
  const conseils = {
    rouge:'Travailler l\'étape LOCALISER — distinguer sensation réelle vs signal d\'alarme. Exercice : observer une sensation sans l\'interpréter pendant 30 secondes.',
    orange:'Travailler l\'étape ACCUEILLIR — créer une fenêtre de tolérance émotionnelle. Exercice : nommer l\'émotion présente avec un seul mot.',
    jaune:'Travailler l\'étape VOIR — identifier le déclencheur de l\'incertitude. Exercice : noter le "et si" et le laisser sans réponse.',
    vert:'Travailler l\'étape EXPLORER — identifier le besoin caché derrière l\'adaptation. Exercice : compléter "Ce que j\'ai besoin et que je n\'exprime pas est…"',
    bleu:'Travailler l\'étape UNIFIER — permettre la coexistence contrôle/lâcher-prise. Exercice : déléguer une micro-tâche cette semaine.',
    indigo:'Travailler l\'étape RENFORCER — valider un comportement tenté même imparfait. Exercice : noter une réussite "suffisamment bonne" par jour.',
    violet:'Travailler l\'étape EXPLORER — cartographier les différents rôles sans les fusionner. Exercice : "Dans quel contexte je me sens le plus moi ?"',
  };
  el.innerHTML = `<strong>${n} manifestation${n>1?'s':''} observée${n>1?'s':''}.</strong><br><br>${conseils[masque]||''}`;
}

function selectSeance(id){
  selectedHist = id;
  // Mettre à jour sélection visuelle
  document.querySelectorAll('.hist-card').forEach(c=>c.classList.remove('selected'));
  if(id===null){
    document.getElementById('new-seance-card')?.classList.add('selected');
    // Réinitialiser
    checkedComportements.clear();
    checkedRessources.clear();
    intensite = 3;
    setIntensite(3);
    document.querySelectorAll('.check-item').forEach(el=>el.classList.remove('checked'));
    const nt=document.getElementById('notes-seance');
    if(nt) nt.value='';
    document.getElementById('fc-title').textContent='Nouvelle séance';
    document.getElementById('fc-date').textContent=new Date().toLocaleDateString('fr-FR');
    document.getElementById('delete-btn-wrap').innerHTML='';
    return;
  }
  const h = HIST.find(x=>x.id===id);
  if(!h) return;
  document.getElementById('hcard-'+id)?.classList.add('selected');
  // Charger les données de la séance sélectionnée
  checkedComportements = new Set(h.comportements_coches||[]);
  checkedRessources = new Set(h.ressources_observees||[]);
  intensite = h.intensite||3;
  setIntensite(intensite);
  document.querySelectorAll('[id^="comp-"]').forEach(el=>{
    const i=parseInt(el.id.split('-')[1]);
    el.classList.toggle('checked', checkedComportements.has(i));
  });
  document.querySelectorAll('[id^="res-"]').forEach(el=>{
    const i=parseInt(el.id.split('-')[1]);
    el.classList.toggle('checked', checkedRessources.has(i));
  });
  const nt=document.getElementById('notes-seance');
  if(nt) nt.value=h.notes||'';
  const d=new Date(h.date_seance);
  document.getElementById('fc-title').textContent=`Séance du ${d.toLocaleDateString('fr-FR')}`;
  document.getElementById('fc-date').textContent=d.toLocaleDateString('fr-FR');
  document.getElementById('delete-btn-wrap').innerHTML=`<button class="btn btn-danger btn-sm" onclick="deleteSeance(${id})">Supprimer</button>`;
  updateConseils();
}

async function saveSeance(){
  if(!PATIENT_ID) return;
  const notes = document.getElementById('notes-seance')?.value||'';
  try{
    await api('save_manifestation',{
      patient_id: PATIENT_ID,
      masque: MASQUE||'vert',
      comportements_coches: [...checkedComportements],
      ressources_observees: [...checkedRessources],
      intensite,
      notes,
    });
    toast('Séance enregistrée ✓');
    selectedHist = null;
    // Recharger
    await loadData();
    checkedComportements.clear();
    checkedRessources.clear();
  }catch(e){toast('Erreur','err')}
}

async function deleteSeance(id){
  if(!confirm('Supprimer cette fiche de séance ?')) return;
  try{
    await api('delete_manifestation',{id});
    toast('Séance supprimée');
    selectedHist = null;
    await loadData();
  }catch(e){toast('Erreur','err')}
}

// AUTH
function doLogin(){
  const v=document.getElementById('lpwd').value;
  if(v===PWD){sessionStorage.setItem('cab','1');document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');loadData()}
  else{document.getElementById('lerr').style.display='block';document.getElementById('lpwd').value=''}
}
document.getElementById('lpwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
if(sessionStorage.getItem('cab')==='1'){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');loadData()}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='info',dur=3500){
  let stack=document.getElementById('_ts');
  if(!stack){
    stack=document.createElement('div');
    stack.id='_ts';
    stack.style.cssText='position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px';
    document.body.appendChild(stack);
  }
  const t=document.createElement('div');
  const borderColor=type==='ok'?'#2D7A4F':type==='err'?'#B5312A':'#A8873A';
  const icon=type==='ok'?'✓':type==='err'?'✕':'·';
  t.style.cssText=`background:#18130F;color:rgba(245,241,235,.9);padding:11px 17px;
    border-radius:3px;border-left:3px solid ${borderColor};font-size:12px;
    box-shadow:0 6px 24px rgba(0,0,0,.2);display:flex;gap:9px;align-items:center;
    max-width:320px;font-family:'DM Sans',sans-serif;animation:_tIn .2s ease;`;
  t.innerHTML=`<b style="flex-shrink:0">${icon}</b><span>${msg}</span>`;
  if(!document.getElementById('_tStyle')){
    const s=document.createElement('style');
    s.id='_tStyle';
    s.textContent='@keyframes _tIn{from{transform:translateX(14px);opacity:0}to{transform:none;opacity:1}}';
    document.head.appendChild(s);
  }
  stack.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .25s';t.style.opacity='0';setTimeout(()=>t.remove(),250);},dur);
}

// ── NAVIGATION BREADCRUMB ─────────────────────────────────────
function setBreadcrumb(items){
  const el=document.getElementById('_bc');
  if(!el)return;
  el.innerHTML=items.map((item,i)=>{
    if(i===items.length-1)
      return `<span style="color:var(--ink,#1A1714);font-weight:500">${item.label}</span>`;
    return `<a href="${item.href||'#'}" style="color:rgba(26,23,20,.4);text-decoration:none;transition:color .15s"
      onmouseover="this.style.color='#1A1714'" onmouseout="this.style.color='rgba(26,23,20,.4)'">${item.label}</a>
      <span style="color:rgba(26,23,20,.2);margin:0 2px">›</span>`;
  }).join('');
}</script>
